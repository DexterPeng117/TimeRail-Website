<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的项目</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=Inter:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: rgba(255,255,255,0.08);
      --accent: #c8ff00;
      --text: #f0f0f0;
      --muted: #666;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(13,13,13,0.85);
      backdrop-filter: blur(12px);
      z-index: 100;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      letter-spacing: -0.02em;
    }
    .logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 32px; list-style: none; }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      transition: color .2s;
    }
    .nav-links a:hover { color: var(--text); }

    /* ── Hero ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 40px;
      gap: 32px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(200,255,0,0.06) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .badge {
      display: inline-block;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      animation: fadeUp .6s ease both;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.5rem, 7vw, 5rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.04em;
      animation: fadeUp .6s .1s ease both;
    }
    h1 .accent { color: var(--accent); }
    .subtitle {
      max-width: 520px;
      line-height: 1.7;
      color: var(--muted);
      font-size: 1rem;
      animation: fadeUp .6s .2s ease both;
    }
    .cta-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp .6s .3s ease both;
    }
    .btn {
      padding: 12px 28px;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: transform .15s, opacity .15s;
      text-decoration: none;
      display: inline-block;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #000; border: none; }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }

    /* ── Cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      padding: 0 40px 80px;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
      animation: fadeUp .6s .4s ease both;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      transition: border-color .2s, transform .2s;
    }
    .card:hover { border-color: rgba(200,255,0,0.3); transform: translateY(-3px); }
    .card-icon { font-size: 1.5rem; margin-bottom: 14px; }
    .card h3 { font-family: 'Syne', sans-serif; font-size: 1rem; margin-bottom: 8px; }
    .card p { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.8rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">MY<span>.</span>PROJECT</div>
    <ul class="nav-links">
      <li><a href="#">首页</a></li>
      <li><a href="#">关于</a></li>
      <li><a href="#">联系</a></li>
    </ul>
  </nav>

  <main class="hero">
    <span class="badge">🚀 个人项目起点</span>
    <h1>从这里<br/><span class="accent">开始构建</span></h1>
    <p class="subtitle">这是一个干净的空白起点。删掉你不需要的，填入你的想法，然后把它变成真正的产品。</p>
    <div class="cta-row">
      <a href="#" class="btn btn-primary">开始使用</a>
      <a href="#" class="btn btn-outline">了解更多</a>
    </div>
  </main>

  <section class="cards">
    <div class="card">
      <div class="card-icon">⚡</div>
      <h3>功能一</h3>
      <p>在这里描述你的第一个核心功能或模块。</p>
    </div>
    <div class="card">
      <div class="card-icon">🎯</div>
      <h3>功能二</h3>
      <p>在这里描述你的第二个核心功能或模块。</p>
    </div>
    <div class="card">
      <div class="card-icon">🛠️</div>
      <h3>功能三</h3>
      <p>在这里描述你的第三个核心功能或模块。</p>
    </div>
  </section>

  <footer>© 2025 我的项目 · 用 Claude 构建</footer>

</body>
</html>
